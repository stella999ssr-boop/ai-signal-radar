# ============================================================
# 评分参数
# ============================================================
scoring:
  dimensions:
    novelty:      { weight: 0.25, description: "新颖性：这条信息有多新/多意外" }
    impact:       { weight: 0.30, description: "影响力：对行业格局的影响程度" }
    actionability:{ weight: 0.15, description: "可执行性：能否转化为行动" }
    controversy:  { weight: 0.20, description: "争议性：是否引发讨论/冲突" }
    persistence:  { weight: 0.10, description: "持续性：是否可能持续发酵" }

  signal_thresholds:
    alert:  80   # ≥80 且跨源≥3 → 即时警报
    daily:   60   # ≥60 → 日报精选
    noise:    0   # <60 → 不推送

  cross_source_min: 3  # 至少3个信源报道才触发警报
